name: IPV Pipeline to Google Sheets

on:
  schedule:
    - cron: "0 23 * * *"  # daily 23:00 UTC = 07:00 PH time
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          python pipeline_to_sheets.py
